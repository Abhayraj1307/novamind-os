<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NOVA PRIME // SINGULARITY</title>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        /* --- 1. SINGULARITY VISUAL SYSTEM --- */
        :root {
            --bg-deep: #030305;
            --glass-surface: rgba(20, 20, 25, 0.75);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-highlight: rgba(255, 255, 255, 0.15);

            --neon-blue: #3b82f6;
            --neon-purple: #a855f7;
            --neon-cyan: #06b6d4;
            --neon-green: #10b981;
            --neon-red: #f43f5e;
            --neon-gold: #fbbf24;

            --text-main: #ffffff;
            --text-sub: #94a3b8;
            --text-dim: #475569;

            --font-ui: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
            --font-mono: "JetBrains Mono", monospace;

            --radius-xl: 32px;
            --radius-md: 16px;
        }

        * {
            box-sizing: border-box;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        ::selection {
            background: var(--neon-blue);
            color: white;
        }

        body {
            margin: 0;
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: var(--font-ui);
            height: 100vh;
            display: flex;
            overflow: hidden;
            background-image:
                radial-gradient(circle at 10% 10%, rgba(59, 130, 246, 0.1), transparent 40%),
                radial-gradient(circle at 90% 90%, rgba(168, 85, 247, 0.1), transparent 40%);
        }

        /* --- 2. AUTHENTICATION OVERLAY --- */
        #auth-screen {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #000 70%);
        }

        .auth-card {
            width: 420px;
            padding: 48px;
            border-radius: 24px;
            background: rgba(30, 30, 35, 0.6);
            backdrop-filter: blur(40px);
            border: 1px solid var(--glass-border);
            text-align: center;
            box-shadow: 0 0 100px rgba(0, 0, 0, 0.8);
            animation: scaleIn 0.4s ease-out;
        }

        .auth-logo {
            font-size: 3rem;
            font-weight: 200;
            letter-spacing: -2px;
            margin-bottom: 5px;
            color: white;
        }

        .auth-sub {
            color: var(--text-sub);
            font-size: 0.9rem;
            margin-bottom: 30px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .auth-input {
            width: 100%;
            padding: 16px;
            margin-bottom: 12px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            transition: 0.2s;
        }

        .auth-input:focus {
            border-color: var(--neon-blue);
            background: rgba(59, 130, 246, 0.05);
        }

        .auth-btn {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            border: none;
            background: var(--neon-blue);
            color: white;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 10px;
            box-shadow: 0 0 30px rgba(59, 130, 246, 0.3);
            transition: 0.2s;
        }

        .auth-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 50px rgba(59, 130, 246, 0.5);
        }

        /* --- 3. SIDEBAR --- */
        .sidebar {
            width: 280px;
            background: var(--glass-surface);
            backdrop-filter: blur(50px);
            border-right: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            padding: 24px;
            gap: 20px;
            z-index: 50;
            flex-shrink: 0;
        }

        .brand {
            font-family: var(--font-mono);
            font-weight: 800;
            letter-spacing: 2px;
            color: white;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.1rem;
            margin-bottom: 10px;
            cursor: pointer;
        }

        .brand i {
            color: var(--neon-cyan);
            font-size: 1.4rem;
        }

        .btn-new {
            width: 100%;
            padding: 14px;
            border-radius: 14px;
            border: 1px solid var(--glass-border);
            background: linear-gradient(90deg, rgba(255, 255, 255, 0.05), transparent);
            color: white;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.3s;
        }

        .btn-new:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--neon-blue);
        }

        /* Modes */
        .mode-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .mode-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid transparent;
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            color: var(--text-sub);
        }

        .mode-card i {
            font-size: 1.2rem;
        }

        .mode-card span {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .mode-card:hover {
            background: rgba(255, 255, 255, 0.05);
            color: white;
        }

        .mode-card.active {
            background: rgba(59, 130, 246, 0.15);
            border-color: var(--neon-blue);
            color: white;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.1);
        }

        .section-label {
            font-size: 0.65rem;
            color: var(--text-dim);
            font-weight: 800;
            letter-spacing: 1.5px;
            margin-top: 10px;
        }

        .list-container {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 4px;
            padding-right: 4px;
        }

        .list-item {
            padding: 10px;
            border-radius: 8px;
            font-size: 0.85rem;
            color: var(--text-sub);
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.2s;
        }

        .list-item:hover {
            background: rgba(255, 255, 255, 0.05);
            color: white;
        }

        .list-item i {
            opacity: 0;
            color: var(--neon-red);
        }

        .list-item:hover i {
            opacity: 1;
        }

        /* User Footer */
        .user-zone {
            padding-top: 20px;
            border-top: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .user-pill {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .avatar {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--neon-purple), var(--neon-blue));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: bold;
        }

        .logout-btn {
            color: var(--text-sub);
            cursor: pointer;
            padding: 6px;
            border-radius: 6px;
            transition: 0.2s;
        }

        .logout-btn:hover {
            background: rgba(244, 63, 94, 0.2);
            color: var(--neon-red);
        }

        /* --- 4. MAIN STAGE --- */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .header {
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            background: linear-gradient(to bottom, var(--bg-deep), transparent);
            z-index: 10;
        }

        .status-badge {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.75rem;
            color: var(--neon-green);
            font-family: var(--font-mono);
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
        }

        .live-dot {
            width: 6px;
            height: 6px;
            background: var(--neon-green);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--neon-green);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                opacity: 1;
            }

            50% {
                opacity: 0.3;
            }

            100% {
                opacity: 1;
            }
        }

        /* CHAT STREAM */
        #chat-window {
            flex: 1;
            overflow-y: auto;
            padding: 40px 15% 160px 15%;
            scroll-behavior: smooth;
        }

        .msg-row {
            margin-bottom: 30px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            animation: slideUp 0.4s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .msg-role {
            font-size: 0.7rem;
            color: var(--text-dim);
            font-weight: 800;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-left: 14px;
        }

        .bubble {
            padding: 20px 24px;
            border-radius: 24px;
            font-size: 1rem;
            line-height: 1.7;
            position: relative;
            backdrop-filter: blur(10px);
            max-width: 100%;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }

        .user .bubble {
            background: linear-gradient(135deg, var(--neon-blue), #2563eb);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .assistant .bubble {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        /* SPECIAL UI COMPONENTS */
        /* Thinking */
        .thought-box {
            margin-bottom: 15px;
        }

        details summary {
            cursor: pointer;
            color: var(--text-sub);
            font-size: 0.8rem;
            font-weight: 600;
            list-style: none;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
        }

        details summary:hover {
            color: var(--neon-cyan);
        }

        .thought-content {
            margin-top: 10px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            font-family: var(--font-mono);
            font-size: 0.8rem;
            color: #888;
            border: 1px solid var(--glass-border);
            white-space: pre-wrap;
        }

        /* Swarm */
        .swarm-log {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--neon-purple);
            border-radius: 16px;
            padding: 20px;
            font-family: var(--font-mono);
            font-size: 0.85rem;
            margin-top: 10px;
        }

        .swarm-header {
            color: var(--neon-purple);
            font-weight: bold;
            margin-bottom: 10px;
            font-size: 0.7rem;
            letter-spacing: 1px;
        }

        .swarm-step {
            margin-bottom: 6px;
            padding-left: 10px;
            border-left: 2px solid var(--neon-purple);
        }

        /* Gen UI Widgets */
        .widget-card {
            background: rgba(30, 30, 35, 0.6);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 24px;
            margin-top: 16px;
            min-width: 300px;
        }

        .widget-title {
            color: var(--neon-blue);
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 15px;
            font-size: 0.8rem;
            letter-spacing: 1px;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 10px;
        }

        .widget-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            align-items: center;
            font-size: 0.9rem;
        }

        .widget-val {
            color: var(--neon-cyan);
            font-family: var(--font-mono);
        }

        .bubble img {
            max-width: 100%;
            border-radius: 16px;
            margin-top: 12px;
            border: 1px solid var(--glass-border);
        }

        /* INPUT DECK */
        .input-dock {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 700px;
            max-width: 90%;
            background: rgba(20, 20, 23, 0.9);
            backdrop-filter: blur(40px);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            padding: 10px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
            z-index: 100;
        }

        .dock-input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 12px;
            font-size: 1.1rem;
            color: white;
            font-family: var(--font-ui);
        }

        .icon-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: none;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-sub);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            transition: 0.2s;
        }

        .icon-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            color: white;
        }

        .send-btn {
            background: var(--text-main);
            color: black;
        }

        .send-btn:hover {
            background: white;
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.4);
        }

        .mic-active {
            color: var(--neon-red);
            animation: pulseRed 1.5s infinite;
        }

        @keyframes pulseRed {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.1);
            }

            100% {
                transform: scale(1);
            }
        }

        /* SETTINGS MODAL */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            z-index: 200;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-card {
            width: 800px;
            height: 600px;
            background: #0a0a0c;
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            display: flex;
            overflow: hidden;
            box-shadow: 0 50px 100px black;
        }

        .dash-side {
            width: 220px;
            background: rgba(255, 255, 255, 0.02);
            padding: 30px;
            border-right: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .dash-main {
            flex: 1;
            padding: 40px;
            color: white;
            overflow-y: auto;
        }

        .dash-btn {
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            color: var(--text-sub);
            font-weight: 600;
            text-align: left;
            background: transparent;
            border: none;
            width: 100%;
            transition: 0.2s;
        }

        .dash-btn:hover,
        .dash-btn.active {
            background: rgba(255, 255, 255, 0.05);
            color: white;
        }

        .api-box {
            background: #000;
            padding: 20px;
            border-radius: 12px;
            font-family: var(--font-mono);
            color: var(--neon-green);
            margin-top: 15px;
            border: 1px dashed var(--glass-border);
            word-break: break-all;
        }

        @keyframes scaleIn {
            from {
                transform: scale(0.9);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        @media (max-width: 900px) {
            .sidebar {
                display: none;
            }

            .input-dock {
                width: 95%;
                bottom: 20px;
            }

            .header {
                padding: 0 20px;
            }

            #chat-stream {
                padding: 100px 5% 150px 5%;
            }
        }
    </style>
</head>

<body>

    <div id="auth-screen">
        <div class="auth-card">
            <div style="font-size: 3rem; margin-bottom: 10px; color: var(--neon-blue);"><i
                    class="ph ph-fingerprint-simple"></i></div>
            <h1 style="letter-spacing: 2px;">NOVA PRIME</h1>
            <p style="color:var(--text-sub); margin-bottom: 30px;">Secure Environment Entry</p>

            <div id="signup-fields" style="display:none;">
                <input type="text" id="fullname" class="auth-input" placeholder="Full Name">
            </div>
            <input type="email" id="email" class="auth-input" placeholder="Email Address">
            <input type="password" id="password" class="auth-input" placeholder="Password">

            <button class="auth-btn" onclick="handleAuth()">INITIALIZE SESSION</button>
            <p style="margin-top:20px; font-size:0.8rem; cursor:pointer; color:var(--text-sub);"
                onclick="toggleSignup()">New User? <span style="color:var(--text-main)">Register Protocol</span></p>
            <div id="auth-msg" style="color:var(--neon-red); margin-top:10px; font-size:0.8rem;"></div>
        </div>
    </div>

    <div class="app-container" style="display:flex; width:100%; height:100%;">
        <nav class="sidebar">
            <div class="brand" onclick="openDash()"><i class="ph ph-sparkle" style="color:var(--neon-cyan)"></i>
                <span>NOVA OS</span></div>

            <button class="btn-new" onclick="startNewChat()">
                <i class="ph ph-plus"></i> NEW OPERATION
            </button>

            <div class="section-label" style="margin-top: 20px;">NEURAL MODES</div>
            <div class="mode-grid">
                <div class="mode-card active" id="mode-operator" onclick="setMode('operator')"><i
                        class="ph ph-lightning"></i><span>EXEC</span></div>
                <div class="mode-card" id="mode-scholar" onclick="setMode('scholar')"><i
                        class="ph ph-student"></i><span>RAG</span></div>
                <div class="mode-card" id="mode-builder" onclick="setMode('builder')"><i
                        class="ph ph-code"></i><span>HIVE</span></div>
                <div class="mode-card" id="mode-researcher" onclick="setMode('researcher')"><i
                        class="ph ph-globe"></i><span>WEB</span></div>
            </div>

            <div class="section-label" style="margin-top: 20px;">ACTIVE TASKS</div>
            <div class="list-container" id="task-list"></div>

            <div class="section-label" style="margin-top: 10px;">MEMORY BANKS</div>
            <div class="list-container" id="history-list"></div>

            <div
                style="margin-top:auto; padding-top:20px; border-top:1px solid var(--glass-border); display:flex; justify-content:space-between; align-items:center;">
                <div style="display:flex; align-items:center; gap:10px;">
                    <div class="avatar" id="u-avatar">U</div>
                    <span id="u-name" style="font-size:0.8rem; font-weight:bold;">User</span>
                </div>
                <i class="ph ph-power logout-btn" onclick="logout()"></i>
            </div>
        </nav>

        <main class="main">
            <div class="header">
                <div class="status-badge">
                    <div class="live-dot"></div> TITAN ONLINE
                </div>
                <div style="cursor:pointer; color:var(--text-sub);" onclick="openDash()"><i class="ph ph-gear-six"
                        style="font-size:1.2rem;"></i></div>
            </div>

            <div id="chat-window">
                <div style="text-align:center; margin-top:35vh; opacity:0.3; user-select:none;">
                    <h1
                        style="font-weight:200; font-size:5rem; margin:0; letter-spacing:-4px; background:linear-gradient(to bottom, white, transparent); background-clip:text; -webkit-background-clip:text; -webkit-text-fill-color:transparent; color:transparent;">
                        NOVA</h1>
                    <p style="letter-spacing:6px; font-size:0.8rem;">SOVEREIGN INTELLIGENCE</p>
                </div>
            </div>

            <div class="input-dock">
                <button class="icon-btn" onclick="document.getElementById('file-upload').click()"><i
                        class="ph ph-paperclip"></i></button>
                <input type="file" id="file-upload" hidden multiple>

                <input type="text" class="dock-input" id="msg-input" placeholder="Enter directive..."
                    autocomplete="off">

                <button class="icon-btn" id="mic-btn" onclick="toggleMic()"><i class="ph ph-microphone"></i></button>
                <button class="icon-btn send-btn" onclick="send()"><i class="ph ph-arrow-up"></i></button>
            </div>
        </main>
    </div>

    <div id="dash-modal" class="modal">
        <div class="modal-card">
            <div class="dash-side">
                <h3 style="margin-bottom:20px; color:white;">COMMAND</h3>
                <button class="dash-btn active" onclick="dashTab('overview')">OVERVIEW</button>
                <button class="dash-btn" onclick="dashTab('api')">API KEYS</button>
                <div style="flex:1"></div>
                <button class="dash-btn" style="color:var(--neon-red);" onclick="closeDash()">EXIT</button>
            </div>
            <div class="dash-main" id="dash-content"></div>
        </div>
    </div>

    <script>
        const API = "http://127.0.0.1:8000/api/v1";
        let currentUser = JSON.parse(localStorage.getItem('nova_user')) || null;
        let isSignup = false;
        let currentMode = "operator";
        let currentChatId = "new";
        let availableVoices = [];

        // --- VOICE ENGINE (FORCE LOAD) ---
        function loadVoices() {
            availableVoices = window.speechSynthesis.getVoices();
            if (availableVoices.length === 0) setTimeout(loadVoices, 100);
        }
        window.speechSynthesis.onvoiceschanged = loadVoices;
        loadVoices();

        function speak(text) {
            if (!text || text.includes("IMAGE_GENERATED")) return;
            window.speechSynthesis.cancel();

            const utterance = new SpeechSynthesisUtterance(text.replace(/[*#]/g, ''));
            utterance.rate = 1.0; utterance.pitch = 1.0;

            const preferred = availableVoices.find(v => v.name.includes("Samantha") || v.name.includes("Google US"));
            if (preferred) utterance.voice = preferred;

            window.speechSynthesis.speak(utterance);
        }

        if (currentUser) initApp(currentUser);

        // --- AUTH ---
        function toggleSignup() {
            isSignup = !isSignup;
            document.getElementById('signup-fields').style.display = isSignup ? 'block' : 'none';
        }
        async function handleAuth() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const fullname = document.getElementById('fullname').value;
            const endpoint = isSignup ? '/auth/register' : '/auth/login';

            try {
                const res = await fetch(`${API}${endpoint}`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password, full_name: fullname })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail);

                if (isSignup) {
                    document.getElementById('auth-msg').innerText = "Verification sent! Check backend console.";
                    document.getElementById('auth-msg').style.color = "var(--neon-green)";
                } else {
                    localStorage.setItem('nova_user', JSON.stringify(data));
                    initApp(data);
                }
            } catch (e) { document.getElementById('auth-msg').innerText = e.message; }
        }

        function initApp(user) {
            currentUser = user;
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('u-name').innerText = user.name || "User";
            document.getElementById('u-avatar').innerText = (user.name || "U")[0].toUpperCase();
            if (user.is_admin) document.getElementById('admin-tag').style.display = 'inline-block';
            loadHistory(); loadTasks();
        }

        function logout() {
            if (confirm("Terminate Session?")) {
                localStorage.removeItem('nova_user');
                location.reload();
            }
        }

        // --- CHAT CORE ---
        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.mode-card').forEach(el => el.classList.remove('active'));
            document.getElementById(`mode-${mode}`).classList.add('active');
            speak(`${mode} mode initialized.`);
        }

        async function send() {
            const input = document.getElementById('msg-input');
            const text = input.value.trim();
            if (!text) return;

            if (document.querySelector('#chat-window h1')) document.getElementById('chat-window').innerHTML = "";
            addMsgToUI(text, 'user');
            input.value = '';

            try {
                const res = await fetch(`${API}/chat/`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user_id: currentUser.user_id, message: text,
                        mode: currentMode, chat_id: currentChatId
                    })
                });
                const data = await res.json();
                if (currentChatId === "new") { currentChatId = data.chat_id; loadHistory(); }

                renderResponse(data.reply);
                speak(data.reply); // VOICE ACTIVATION

            } catch (e) { addMsgToUI("System Offline.", 'assistant'); }
        }

        function renderResponse(text) {
            if (text.includes("<think>")) {
                const parts = text.split("</think>");
                const html = `
                    <div class="thought-box">
                        <details><summary><i class="ph ph-brain"></i> Reasoning...</summary><div class="thought-content">${parts[0].replace("<think>", "")}</div></details>
                    </div><div>${formatMarkdown(parts[1])}</div>`;
                addHtml(html, 'assistant');
            } else if (text.includes("START_SWARM_UI")) {
                const parts = text.split("START_SWARM_UI")[1].split("END_SWARM_UI");
                const logs = JSON.parse(parts[0]);
                let html = `<div class="swarm-log"><div class="swarm-header">HIVE ACTIVE</div>`;
                logs.forEach(l => html += `<div class="swarm-step"><span style="color:white">${l.agent}</span>: ${l.result.substring(0, 50)}...</div>`);
                html += `</div>${formatMarkdown(parts[1])}`;
                addHtml(html, 'assistant');
            } else if (text.includes("START_UI")) {
                const parts = text.split("START_UI")[1].split("END_UI");
                const ui = JSON.parse(parts[0]);
                let html = `<div class="widget-card"><div class="widget-title">${ui.title}</div>`;
                if (ui.type === 'calculator') ui.data.forEach(d => html += `<div class="widget-row"><span>${d.label}</span><span class="widget-val">${d.value}</span></div>`);
                html += `</div>`;
                addHtml(html, 'assistant');
            } else if (text.includes("IMAGE_GENERATED")) {
                addHtml(`<img src="${text.split(': ')[1]}">`, 'assistant');
            } else {
                addMsgToUI(text, 'assistant');
            }
        }

        function addMsgToUI(text, role) {
            const html = role === 'user' ? text : formatMarkdown(text);
            addHtml(html, role);
        }

        function addHtml(html, role) {
            const win = document.getElementById('chat-window');
            const row = document.createElement('div');
            row.className = `msg-row`;
            row.innerHTML = `
                <div class="msg-role">${role === 'user' ? 'YOU' : 'NOVA'}</div>
                <div class="bubble ${role}">${html}</div>
            `;
            win.appendChild(row);
            win.scrollTop = win.scrollHeight;
        }

        function formatMarkdown(text) {
            return text.replace(/\n/g, '<br>').replace(/\*\*(.*?)\*\*/g, '<b style="color:var(--neon-blue)">$1</b>');
        }

        // --- HISTORY & UTILS ---
        async function loadHistory() {
            try {
                const res = await fetch(`${API}/history/sessions/${currentUser.user_id}`);
                const data = await res.json();
                document.getElementById('history-list').innerHTML = data.map(s => `
                    <div class="list-item" onclick="loadSession('${s.id}')">
                        <span>${s.title}</span><i class="ph ph-trash" onclick="delChat('${s.id}', event)"></i>
                    </div>`).join('');
            } catch (e) { }
        }
        async function loadTasks() {
            try {
                const res = await fetch(`${API}/tasks?user_id=${currentUser.user_id}`);
                const data = await res.json();
                document.getElementById('task-list').innerHTML = data.map(t => `
                    <div class="list-item" style="color:var(--neon-gold)">• ${t.title}</div>`).join('');
            } catch (e) { }
        }
        async function loadSession(id) {
            currentChatId = id;
            document.getElementById('chat-window').innerHTML = "";
            const res = await fetch(`${API}/history/messages/${id}`);
            const data = await res.json();
            data.forEach(m => addMsgToUI(m.content, m.role === 'user' ? 'user' : 'assistant'));
        }
        async function delChat(id, e) {
            e.stopPropagation();
            if (!confirm("Purge?")) return;
            await fetch(`${API}/chat/${id}`, { method: 'DELETE' });
            loadHistory();
        }
        function startNewChat() { currentChatId = "new"; document.getElementById('chat-window').innerHTML = `<div style="text-align:center; margin-top:30vh; opacity:0.3;"><h1 style="font-weight:200; font-size:4rem;">NOVA</h1></div>`; }

        // --- DASHBOARD ---
        function openDash() { document.getElementById('dash-modal').classList.add('active'); dashTab('overview'); }
        function closeDash() { document.getElementById('dash-modal').classList.remove('active'); }

        function dashTab(tab) {
            const content = document.getElementById('dash-content');
            document.querySelectorAll('.dash-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');

            if (tab === 'overview') {
                content.innerHTML = `<h1>System Overview</h1><p>Status: <span style="color:var(--neon-green)">Optimal</span></p><div class="widget-card"><h3>User Stats</h3><div class="widget-row"><span>Sessions</span><span class="widget-val">${document.querySelectorAll('.list-item').length}</span></div></div>`;
            } else if (tab === 'api') {
                content.innerHTML = `<h1>Developer API</h1><p style="color:#888">Build on Nova.</p><div class="api-box" id="api-disp">Click generate</div><button class="auth-btn" style="width:auto; margin-top:10px;" onclick="genKey()">Generate Key</button>`;
            }
        }
        async function genKey() {
            try {
                const res = await fetch(`${API}/auth/generate_key?user_id=${currentUser.user_id}&key_name=Dash`, { method: 'POST' });
                const data = await res.json();
                document.getElementById('api-disp').innerText = data.api_key;
            } catch { document.getElementById('api-disp').innerText = "Error"; }
        }

        document.getElementById('msg-input').addEventListener('keypress', e => { if (e.key === 'Enter') send(); });
        function toggleMic() {
            if (!('webkitSpeechRecognition' in window)) return alert("Use Chrome.");
            recognition = new webkitSpeechRecognition();
            recognition.lang = 'en-US';
            recognition.onstart = () => document.getElementById('mic-btn').classList.add('mic-active');
            recognition.onend = () => document.getElementById('mic-btn').classList.remove('mic-active');
            recognition.onresult = (e) => {
                const txt = e.results[0][0].transcript;
                document.getElementById('msg-input').value = txt;
                send();
            };
            recognition.start();
        }
        document.getElementById('file-upload').addEventListener('change', async (e) => {
            const formData = new FormData(); formData.append('user_id', currentUser.user_id); formData.append('file', e.target.files[0]);
            addMsgToUI(`Ingesting ${e.target.files[0].name}...`, 'user');
            await fetch(`${API}/files/upload`, { method: 'POST', body: formData });
            addMsgToUI(`File assimilated.`, 'assistant');
        });
    </script>
</body>

</html>
